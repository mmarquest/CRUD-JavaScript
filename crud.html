<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Estoque</title>
</head>
<body>
  <h1>Sistema de Estoque</h1>
  <button onclick="iniciarSistema()">Iniciar</button>

  <script>
    let estoque = [];

    function adicionarItem(lista, item) {
      if (item.trim() === "") {
        alert("Erro: O nome do item não pode estar vazio.");
        return;
      }
      lista.push(item);
      alert(`Item "${item}" adicionado com sucesso!`);
    }

    function mostrarItens(lista) {
      if (lista.length === 0) {
        alert("O estoque está vazio.");
        return;
      }
      let listaFormatada = "--- Itens no Estoque ---\n";
      lista.forEach((item, index) => {
        listaFormatada += `${index} - ${item}\n`;
      });
      alert(listaFormatada);
    }

    function atualizarItem(lista, indice, novoValor) {
      if (validarIndice(lista, indice)) {
        let valorAntigo = lista[indice];
        lista[indice] = novoValor;
        alert(`Item "${valorAntigo}" atualizado para "${novoValor}".`);
      }
    }

    function removerItem(lista, posicao) {
      if (lista.length === 0) {
        alert("Erro: Não há itens para remover.");
        return;
      }

      if (posicao === "primeiro") {
        let removido = lista.shift();
        alert(`Item "${removido}" removido do início.`);
      } else if (posicao === "ultimo") {
        let removido = lista.pop();
        alert(`Item "${removido}" removido do fim.`);
      }
    }

    function validarIndice(lista, indice) {
      if (isNaN(indice) || indice < 0 || indice >= lista.length) {
        alert("Posição inválida!");
        return false;
      }
      return true;
    }

    function iniciarSistema() {
      let opcao = "";

      while (opcao !== "0") {
        opcao = prompt(
          "SISTEMA DE ESTOQUE\n" +
          "1 - Adicionar Item\n" +
          "2 - Mostrar Itens\n" +
          "3 - Atualizar Item\n" +
          "4 - Remover Primeiro\n" +
          "5 - Remover Último\n" +
          "0 - Sair"
        );

        switch (opcao) {
          case "1":
            let novo = prompt("Digite o nome do item:");
            adicionarItem(estoque, novo);
            break;
          case "2":
            mostrarItens(estoque);
            break;
          case "3":
            let idx = parseInt(prompt("Digite o índice que deseja alterar:"));
            if (validarIndice(estoque, idx)) {
              let valor = prompt("Digite o novo nome para o item:");
              atualizarItem(estoque, idx, valor);
            }
            break;
          case "4":
            removerItem(estoque, "primeiro");
            break;
          case "5":
            removerItem(estoque, "ultimo");
            break;
          case "0":
            alert("Saindo do sistema...");
            break;
          default:
            alert("Opção inválida!");
        }
      }
    }
  </script>
</body>
</html>
